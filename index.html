<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>오메가3 구매 신청</title>
<style>
  :root {
    --purple-deep: #4a3580;
    --purple-mid: #6b52b5;
    --purple-light: #9b85d4;
    --purple-pale: #ede9f8;
    --purple-soft: #f5f2fc;
    --brown: #c4895a;
    --brown-light: #f7efe6;
    --text-dark: #1e1533;
    --text-mid: #5a4f72;
    --text-muted: #9b93b0;
    --border: #ddd6f0;
    --white: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--purple-soft);
    font-family: -apple-system, 'Apple SD Gothic Neo', BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .wrap {
    background: var(--white);
    border-radius: 20px;
    width: 100%;
    max-width: 480px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(74, 53, 128, 0.1);
  }
  .hero {
    background: linear-gradient(160deg, #5c44a0 0%, #3d2b6e 100%);
    padding: 2rem 1.5rem 1.75rem;
    text-align: center;
    position: relative;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 24px;
    background: var(--white);
    border-radius: 20px 20px 0 0;
  }
  .pill {
    display: inline-block;
    background: rgba(255,255,255,0.18);
    color: #e8e0ff;
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 14px;
    font-weight: 500;
    letter-spacing: 0.3px;
    border: 1px solid rgba(255,255,255,0.25);
  }
  .hero h1 {
    font-size: 21px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
    line-height: 1.4;
  }
  .hero .sub {
    font-size: 13px;
    color: rgba(255,255,255,0.65);
  }
  .body { padding: 1.75rem 1.5rem; }
  .info-bar {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 1.5rem;
  }
  .info-card {
    background: var(--purple-soft);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
  }
  .info-card .label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
  .info-card .value { font-size: 18px; font-weight: 700; color: var(--text-dark); }
  .info-card .value.highlight { color: var(--purple-mid); }
  .field { margin-bottom: 1.25rem; }
  .field label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-mid);
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 15px;
    color: var(--text-dark);
    outline: none;
    background: var(--white);
    transition: border 0.15s;
    font-family: inherit;
  }
  .field input:focus { border-color: var(--purple-mid); }
  .toggle-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .toggle-btn {
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    cursor: pointer;
    background: var(--white);
    text-align: center;
    transition: all 0.15s;
  }
  .toggle-btn:hover { background: var(--purple-soft); }
  .toggle-btn.active {
    border-color: var(--purple-mid);
    background: var(--purple-pale);
  }
  .toggle-btn .t-icon { font-size: 20px; margin-bottom: 4px; }
  .toggle-btn .t-label { font-size: 13px; color: var(--text-mid); }
  .toggle-btn.active .t-label { color: var(--purple-deep); font-weight: 600; }
  .toggle-btn .t-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .toggle-btn.active .t-sub { color: var(--purple-light); }
  .delivery-box {
    background: var(--purple-soft);
    border-radius: 12px;
    padding: 1rem;
    margin-top: 8px;
    border: 1px solid var(--border);
  }
  .delivery-box.hidden { display: none; }
  .delivery-box .field:last-child { margin-bottom: 0; }
  .qty-row { display: flex; align-items: center; gap: 12px; }
  .qty-btn {
    width: 38px; height: 38px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--white);
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--purple-mid);
    flex-shrink: 0;
    transition: all 0.15s;
    font-weight: 500;
  }
  .qty-btn:hover { background: var(--purple-pale); border-color: var(--purple-light); }
  .qty-display { flex: 1; text-align: center; font-size: 20px; font-weight: 700; color: var(--text-dark); }
  .qty-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
  .total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .total-label { font-size: 14px; color: var(--text-muted); }
  .total-value { font-size: 14px; color: var(--text-dark); }
  .total-row.final .total-label { font-size: 16px; font-weight: 600; color: var(--text-dark); }
  .total-row.final .total-value { font-size: 22px; font-weight: 700; color: var(--purple-mid); }
  .submit-btn {
    width: 100%;
    background: linear-gradient(135deg, #6b52b5 0%, #4a3580 100%);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 15px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 1.5rem;
    transition: opacity 0.15s;
    font-family: inherit;
    letter-spacing: 0.3px;
  }
  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:active { transform: scale(0.99); }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .notice { font-size: 12px; color: var(--text-muted); text-align: center; margin-top: 12px; line-height: 1.7; }
  .success { display: none; text-align: center; padding: 1rem 0; }
  .success .check { font-size: 48px; margin-bottom: 1rem; }
  .success h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: var(--text-dark); }
  .success .sub { font-size: 14px; color: var(--text-muted); line-height: 1.7; margin-bottom: 1rem; }
  .account-box {
    background: var(--brown-light);
    border: 1px solid #e8d5c0;
    border-radius: 14px;
    padding: 14px 16px;
    margin: 1rem 0;
    text-align: left;
  }
  .acc-bank { font-size: 11px; color: var(--brown); font-weight: 600; margin-bottom: 6px; letter-spacing: 0.3px; }
  .acc-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .acc-number { font-size: 18px; font-weight: 700; color: var(--text-dark); letter-spacing: 0.5px; }
  .copy-btn {
    flex-shrink: 0;
    border: 1.5px solid #e0c9ad;
    border-radius: 8px;
    background: var(--white);
    color: var(--brown);
    font-size: 12px;
    font-weight: 600;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    font-family: inherit;
  }
  .copy-btn:hover { background: var(--brown-light); }
  .copy-btn.copied { background: #f0ebe4; color: #a06830; border-color: var(--brown); }
  .success-detail { font-size: 13px; color: var(--text-mid); line-height: 1.9; margin-top: 4px; }
</style>
</head>
<body>
<div class="wrap">
  <div id="form-section">
    <div class="hero">
      <div class="pill">직원 전용 특가</div>
      <h1>진심네이처 알티지<br>오메가3 구매 신청</h1>
      <p class="sub">유통기한 2027년 2월 3일까지</p>
    </div>

    <div class="body">
      <div class="info-bar">
        <div class="info-card">
          <div class="label">판매가</div>
          <div class="value highlight">2,000원</div>
        </div>
        <div class="info-card">
          <div class="label">배송 선택 시</div>
          <div class="value" style="font-size:15px;">+3,000원</div>
        </div>
      </div>

      <div class="field">
        <label>이름</label>
        <input type="text" id="name" placeholder="홍길동" />
      </div>

      <div class="field">
        <label>수량</label>
        <div class="qty-row">
          <button class="qty-btn" onclick="changeQty(-1)">−</button>
          <div>
            <div class="qty-display" id="qty-display">1개</div>
            <div class="qty-sub" id="qty-sub">2,000원</div>
          </div>
          <button class="qty-btn" onclick="changeQty(1)">+</button>
        </div>
      </div>

      <div class="field">
        <label>수령 방법</label>
        <div class="toggle-group">
          <div class="toggle-btn active" id="btn-pickup" onclick="selectMethod('pickup')">
            <div class="t-icon">🏢</div>
            <div class="t-label">직접 수령</div>
            <div class="t-sub">추가 비용 없음</div>
          </div>
          <div class="toggle-btn" id="btn-delivery" onclick="selectMethod('delivery')">
            <div class="t-icon">📦</div>
            <div class="t-label">배송</div>
            <div class="t-sub">배송비 3,000원</div>
          </div>
        </div>
        <div class="delivery-box hidden" id="delivery-box">
          <div class="field">
            <label>수령자 연락처</label>
            <input type="tel" id="phone" placeholder="010-0000-0000" />
          </div>
          <div class="field">
            <label>받는 주소</label>
            <input type="text" id="address" placeholder="도로명 주소를 입력하세요" />
          </div>
          <div class="field">
            <label>상세 주소</label>
            <input type="text" id="address-detail" placeholder="동·호수, 층 등" />
          </div>
        </div>
      </div>

      <hr class="divider">

      <div class="total-row">
        <span class="total-label">상품 금액</span>
        <span class="total-value" id="item-total">2,000원</span>
      </div>
      <div class="total-row" id="delivery-row" style="display:none;">
        <span class="total-label">배송비</span>
        <span class="total-value">3,000원</span>
      </div>
      <div class="total-row final">
        <span class="total-label">합계</span>
        <span class="total-value" id="grand-total">2,000원</span>
      </div>

      <button class="submit-btn" id="submit-btn" onclick="submitForm()">신청하기</button>
      <p class="notice">신청 후 아래 계좌로 입금해 주시면 확인 후 안내드립니다.<br>입금자명은 반드시 본인 이름으로 해주세요.</p>
    </div>
  </div>

  <div class="success" id="success-section" style="padding: 2rem 1.5rem;">
    <div class="check">✅</div>
    <h2>신청이 완료됐어요!</h2>
    <p class="sub">아래 계좌로 입금해 주세요.<br>입금자명은 반드시 <strong>본인 이름</strong>으로 해주세요.</p>
    <div class="account-box">
      <div class="acc-bank">카카오뱅크</div>
      <div class="acc-row">
        <span class="acc-number">3333-13-1815592</span>
        <button class="copy-btn" id="copy-btn" onclick="copyAccount()">계좌 복사</button>
      </div>
    </div>
    <p class="success-detail" id="success-detail"></p>
  </div>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwer23cuRwYB1G7wV1YS2IvZgMnVhfMlOlQY6ts4ooqdxz41G6fTPVJXm3NoBpikwtR/exec';
  let qty = 1, method = 'pickup';

  function selectMethod(m) {
    method = m;
    document.getElementById('btn-pickup').classList.toggle('active', m === 'pickup');
    document.getElementById('btn-delivery').classList.toggle('active', m === 'delivery');
    const box = document.getElementById('delivery-box');
    const row = document.getElementById('delivery-row');
    if (m === 'delivery') { box.classList.remove('hidden'); row.style.display = 'flex'; }
    else { box.classList.add('hidden'); row.style.display = 'none'; }
    updateTotal();
  }

  function changeQty(d) {
    qty = Math.max(1, qty + d);
    document.getElementById('qty-display').textContent = qty + '개';
    document.getElementById('qty-sub').textContent = (qty * 2000).toLocaleString() + '원';
    updateTotal();
  }

  function updateTotal() {
    const item = qty * 2000;
    const total = item + (method === 'delivery' ? 3000 : 0);
    document.getElementById('item-total').textContent = item.toLocaleString() + '원';
    document.getElementById('grand-total').textContent = total.toLocaleString() + '원';
  }

  function copyAccount() {
    const acc = '3333131815592';
    const btn = document.getElementById('copy-btn');
    if (navigator.clipboard) {
      navigator.clipboard.writeText(acc).then(() => showCopied(btn));
    } else {
      const el = document.createElement('textarea');
      el.value = acc; document.body.appendChild(el); el.select();
      document.execCommand('copy'); document.body.removeChild(el);
      showCopied(btn);
    }
  }

  function showCopied(btn) {
    btn.textContent = '복사됨 ✓'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '계좌 복사'; btn.classList.remove('copied'); }, 2000);
  }

  async function submitForm() {
    const name = document.getElementById('name').value.trim();
    if (!name) { alert('이름을 입력해 주세요.'); return; }
    if (method === 'delivery') {
      if (!document.getElementById('phone').value.trim()) { alert('연락처를 입력해 주세요.'); return; }
      if (!document.getElementById('address').value.trim()) { alert('주소를 입력해 주세요.'); return; }
    }
    const btn = document.getElementById('submit-btn');
    btn.disabled = true; btn.textContent = '신청 중...';
    const total = qty * 2000 + (method === 'delivery' ? 3000 : 0);
    const payload = {
      name, qty, method,
      phone: document.getElementById('phone').value.trim(),
      address: document.getElementById('address').value.trim(),
      addressDetail: document.getElementById('address-detail').value.trim(),
      total
    };
    try {
      await fetch(SCRIPT_URL, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
    } catch (err) { console.error(err); }
    document.getElementById('form-section').style.display = 'none';
    const lines = [
      name + '님 · ' + qty + '개 · ' + (method === 'delivery' ? '배송' : '직접 수령'),
      '입금 금액: ' + total.toLocaleString() + '원'
    ];
    if (method === 'delivery') {
      lines.push('배송지: ' + payload.address + ' ' + payload.addressDetail);
      lines.push('연락처: ' + payload.phone);
    }
    document.getElementById('success-detail').innerHTML = lines.join('<br>');
    document.getElementById('success-section').style.display = 'block';
  }
</script>
</body>
</html>
