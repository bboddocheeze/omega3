<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>오메가3 구매 신청</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f5f5f3; font-family: -apple-system, 'Apple SD Gothic Neo', BlinkMacSystemFont, sans-serif; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
  .wrap { background: #fff; border-radius: 16px; width: 100%; max-width: 480px; padding: 2rem 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
  .header { text-align: center; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid #efefef; }
  .pill { display: inline-block; background: #e1f5ee; color: #0f6e56; font-size: 12px; padding: 4px 12px; border-radius: 20px; margin-bottom: 12px; font-weight: 500; }
  .header h1 { font-size: 22px; font-weight: 600; color: #111; margin-bottom: 6px; }
  .header p { font-size: 14px; color: #888; line-height: 1.6; }
  .info-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1.5rem; }
  .info-card { background: #f8f8f6; border-radius: 10px; padding: 12px; text-align: center; }
  .info-card .label { font-size: 11px; color: #aaa; margin-bottom: 4px; }
  .info-card .value { font-size: 18px; font-weight: 600; color: #111; }
  .info-card .value.highlight { color: #1d9e75; }
  .field { margin-bottom: 1.25rem; }
  .field label { display: block; font-size: 13px; font-weight: 500; color: #555; margin-bottom: 6px; }
  .field input { width: 100%; border: 1px solid #e0e0e0; border-radius: 10px; padding: 10px 14px; font-size: 15px; color: #111; outline: none; background: #fff; transition: border 0.15s; }
  .field input:focus { border-color: #1d9e75; }
  .toggle-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .toggle-btn { border: 1px solid #e0e0e0; border-radius: 10px; padding: 12px; cursor: pointer; background: #fff; text-align: center; transition: all 0.15s; }
  .toggle-btn:hover { background: #f8f8f6; }
  .toggle-btn.active { border: 2px solid #1d9e75; background: #e1f5ee; }
  .toggle-btn .t-icon { font-size: 20px; margin-bottom: 4px; }
  .toggle-btn .t-label { font-size: 13px; color: #555; }
  .toggle-btn.active .t-label { color: #0f6e56; font-weight: 600; }
  .toggle-btn .t-sub { font-size: 11px; color: #bbb; margin-top: 2px; }
  .toggle-btn.active .t-sub { color: #1d9e75; }
  .delivery-box { background: #f8f8f6; border-radius: 10px; padding: 1rem; margin-top: 8px; border: 1px solid #efefef; }
  .delivery-box.hidden { display: none; }
  .delivery-box .field:last-child { margin-bottom: 0; }
  .qty-row { display: flex; align-items: center; gap: 12px; }
  .qty-btn { width: 36px; height: 36px; border: 1px solid #e0e0e0; border-radius: 10px; background: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #111; flex-shrink: 0; transition: background 0.15s; }
  .qty-btn:hover { background: #f8f8f6; }
  .qty-display { flex: 1; text-align: center; font-size: 18px; font-weight: 600; color: #111; }
  .qty-sub { font-size: 12px; color: #bbb; margin-top: 2px; }
  .divider { border: none; border-top: 1px solid #efefef; margin: 1.5rem 0; }
  .total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .total-label { font-size: 14px; color: #888; }
  .total-value { font-size: 14px; color: #111; }
  .total-row.final .total-label { font-size: 16px; font-weight: 600; color: #111; }
  .total-row.final .total-value { font-size: 20px; font-weight: 700; color: #1d9e75; }
  .submit-btn { width: 100%; background: #1d9e75; color: #fff; border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 1.5rem; transition: opacity 0.15s; }
  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:active { transform: scale(0.99); }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .notice { font-size: 12px; color: #bbb; text-align: center; margin-top: 12px; line-height: 1.7; }
  .success { display: none; text-align: center; padding: 1rem 0; }
  .success .check { font-size: 48px; margin-bottom: 1rem; }
  .success h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; color: #111; }
  .success .sub { font-size: 14px; color: #888; line-height: 1.7; margin-bottom: 1rem; }
  .account-box { background: #f8f8f6; border-radius: 12px; padding: 14px 16px; margin: 1rem 0; text-align: left; }
  .acc-bank { font-size: 11px; color: #aaa; margin-bottom: 6px; }
  .acc-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .acc-number { font-size: 18px; font-weight: 700; color: #111; letter-spacing: 0.5px; }
  .copy-btn { flex-shrink: 0; border: 1px solid #e0e0e0; border-radius: 8px; background: #fff; color: #555; font-size: 12px; font-weight: 500; padding: 6px 12px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .copy-btn:hover { background: #f8f8f6; }
  .copy-btn.copied { background: #e1f5ee; color: #0f6e56; border-color: #1d9e75; }
  .success-detail { font-size: 13px; color: #888; line-height: 1.9; margin-top: 4px; }
  .error-msg { font-size: 12px; color: #e24b4a; margin-top: 6px; }
</style>
</head>
<body>
<div class="wrap">
  <div id="form-section">
    <div class="header">
      <div class="pill">직원 전용 특가</div>
      <h1>오메가3 구매 신청</h1>
      <p>유통기한 2027년 2월 3일까지</p>
    </div>

    <div class="info-bar">
      <div class="info-card">
        <div class="label">판매가</div>
        <div class="value highlight">2,000원</div>
      </div>
      <div class="info-card">
        <div class="label">배송 선택 시</div>
        <div class="value" style="font-size:15px;">+3,000원</div>
      </div>
    </div>

    <div class="field">
      <label>이름</label>
      <input type="text" id="name" placeholder="홍길동" />
    </div>

    <div class="field">
      <label>수량</label>
      <div class="qty-row">
        <button class="qty-btn" onclick="changeQty(-1)">−</button>
        <div>
          <div class="qty-display" id="qty-display">1개</div>
          <div class="qty-sub" id="qty-sub">2,000원</div>
        </div>
        <button class="qty-btn" onclick="changeQty(1)">+</button>
      </div>
    </div>

    <div class="field">
      <label>수령 방법</label>
      <div class="toggle-group">
        <div class="toggle-btn active" id="btn-pickup" onclick="selectMethod('pickup')">
          <div class="t-icon">🏢</div>
          <div class="t-label">직접 수령</div>
          <div class="t-sub">추가 비용 없음</div>
        </div>
        <div class="toggle-btn" id="btn-delivery" onclick="selectMethod('delivery')">
          <div class="t-icon">📦</div>
          <div class="t-label">배송</div>
          <div class="t-sub">배송비 3,000원</div>
        </div>
      </div>
      <div class="delivery-box hidden" id="delivery-box">
        <div class="field">
          <label>수령자 연락처</label>
          <input type="tel" id="phone" placeholder="010-0000-0000" />
        </div>
        <div class="field">
          <label>받는 주소</label>
          <input type="text" id="address" placeholder="도로명 주소를 입력하세요" />
        </div>
        <div class="field">
          <label>상세 주소</label>
          <input type="text" id="address-detail" placeholder="동·호수, 층 등" />
        </div>
      </div>
    </div>

    <hr class="divider">

    <div class="total-row">
      <span class="total-label">상품 금액</span>
      <span class="total-value" id="item-total">2,000원</span>
    </div>
    <div class="total-row" id="delivery-row" style="display:none;">
      <span class="total-label">배송비</span>
      <span class="total-value">3,000원</span>
    </div>
    <div class="total-row final">
      <span class="total-label">합계</span>
      <span class="total-value" id="grand-total">2,000원</span>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="submitForm()">신청하기</button>
    <p class="notice">신청 후 아래 계좌로 입금해 주시면 확인 후 안내드립니다.<br>입금자명은 반드시 본인 이름으로 해주세요.</p>
  </div>

  <div class="success" id="success-section">
    <div class="check">✅</div>
    <h2>신청이 완료됐어요!</h2>
    <p class="sub">아래 계좌로 입금해 주세요.<br>입금자명은 반드시 <strong>본인 이름</strong>으로 해주세요.</p>
    <div class="account-box">
      <div class="acc-bank">카카오뱅크</div>
      <div class="acc-row">
        <span class="acc-number">3333-13-1815592</span>
        <button class="copy-btn" id="copy-btn" onclick="copyAccount()">계좌 복사</button>
      </div>
    </div>
    <p class="success-detail" id="success-detail"></p>
  </div>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwer23cuRwYB1G7wV1YS2IvZgMnVhfMlOlQY6ts4ooqdxz41G6fTPVJXm3NoBpikwtR/exec';
  let qty = 1;
  let method = 'pickup';

  function selectMethod(m) {
    method = m;
    document.getElementById('btn-pickup').classList.toggle('active', m === 'pickup');
    document.getElementById('btn-delivery').classList.toggle('active', m === 'delivery');
    const box = document.getElementById('delivery-box');
    const row = document.getElementById('delivery-row');
    if (m === 'delivery') { box.classList.remove('hidden'); row.style.display = 'flex'; }
    else { box.classList.add('hidden'); row.style.display = 'none'; }
    updateTotal();
  }

  function changeQty(d) {
    qty = Math.max(1, qty + d);
    document.getElementById('qty-display').textContent = qty + '개';
    document.getElementById('qty-sub').textContent = (qty * 2000).toLocaleString() + '원';
    updateTotal();
  }

  function updateTotal() {
    const item = qty * 2000;
    const total = item + (method === 'delivery' ? 3000 : 0);
    document.getElementById('item-total').textContent = item.toLocaleString() + '원';
    document.getElementById('grand-total').textContent = total.toLocaleString() + '원';
  }

  function copyAccount() {
    const acc = '3333131815592';
    const btn = document.getElementById('copy-btn');
    if (navigator.clipboard) {
      navigator.clipboard.writeText(acc).then(() => showCopied(btn));
    } else {
      const el = document.createElement('textarea');
      el.value = acc;
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
      showCopied(btn);
    }
  }

  function showCopied(btn) {
    btn.textContent = '복사됨 ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '계좌 복사'; btn.classList.remove('copied'); }, 2000);
  }

  async function submitForm() {
    const name = document.getElementById('name').value.trim();
    if (!name) { alert('이름을 입력해 주세요.'); return; }
    if (method === 'delivery') {
      if (!document.getElementById('phone').value.trim()) { alert('연락처를 입력해 주세요.'); return; }
      if (!document.getElementById('address').value.trim()) { alert('주소를 입력해 주세요.'); return; }
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = '신청 중...';

    const total = qty * 2000 + (method === 'delivery' ? 3000 : 0);
    const payload = {
      name,
      qty,
      method,
      phone: document.getElementById('phone').value.trim(),
      address: document.getElementById('address').value.trim(),
      addressDetail: document.getElementById('address-detail').value.trim(),
      total
    };

    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
    } catch (err) {
      console.error(err);
    }

    document.getElementById('form-section').style.display = 'none';
    const lines = [
      name + '님 · ' + qty + '개 · ' + (method === 'delivery' ? '배송' : '직접 수령'),
      '입금 금액: ' + total.toLocaleString() + '원'
    ];
    if (method === 'delivery') {
      lines.push('배송지: ' + payload.address + ' ' + payload.addressDetail);
      lines.push('연락처: ' + payload.phone);
    }
    document.getElementById('success-detail').innerHTML = lines.join('<br>');
    document.getElementById('success-section').style.display = 'block';
  }
</script>
</body>
</html>
